<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-title" content="Dou Di Zhu">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<meta name="theme-color" content="#2e426b" />

	<title>Dou Di Zhu — Table</title>

	<link rel="apple-touch-icon" href="icons/180x180.png" />
	<link rel="icon" href="icons/favicon.png" type="image/png" sizes="32x32">
	<link rel="icon" href="icons/poker-chip.svg" type="image/svg+xml">
	<link rel="manifest" href="manifest.json">
	<link rel="stylesheet" href="css/style.css">
</head>

<body id="doudizhu-table" data-player-count="3">
	<div id="confirm-dialog" class="confirm-dialog hidden" role="dialog" aria-modal="true">
		<div class="confirm-dialog-box">
			<p id="confirm-dialog-message"></p>
			<div class="confirm-dialog-actions">
				<button id="confirm-dialog-yes" type="button">Kick</button>
				<button id="confirm-dialog-no" type="button">Cancel</button>
			</div>
		</div>
	</div>

	<div id="name-prompt" class="name-prompt hidden">
		<div class="name-prompt-dialog">
			<h2>Enter your name</h2>
			<p>Pick a display name to join this table.</p>
			<input id="name-prompt-input" type="text" maxlength="20" placeholder="Player">
			<button id="name-prompt-submit" type="button">Take a seat</button>
		</div>
	</div>

	<header class="share-bar">
		<div id="connection-status" class="connection-status hidden"></div>
		<div id="phase-indicator" class="phase-indicator share-bar-phase"></div>
		<button id="share-copy" type="button">Copy the invite link</button>
	</header>

	<main class="ddz-table">
		<div class="opponent opponent-N" data-seat-slot="N">
			<div class="opponent-name"></div>
			<div class="opponent-role"></div>
			<div class="opponent-hand-count">0</div>
			<div class="opponent-status"></div>
			<div class="opponent-score"></div>
		</div>
		<div class="opponent opponent-W" data-seat-slot="W">
			<div class="opponent-name"></div>
			<div class="opponent-role"></div>
			<div class="opponent-hand-count">0</div>
			<div class="opponent-status"></div>
			<div class="opponent-score"></div>
		</div>
		<div class="opponent opponent-E" data-seat-slot="E">
			<div class="opponent-name"></div>
			<div class="opponent-role"></div>
			<div class="opponent-hand-count">0</div>
			<div class="opponent-status"></div>
			<div class="opponent-score"></div>
		</div>

		<div class="table-center">
			<div id="kitty" class="kitty hidden"></div>
			<div id="turn-history" class="turn-history"></div>
		</div>

		<section class="my-area">
			<div class="me-info">
				<span id="me-name"></span>
				<span id="me-role"></span>
				<span id="me-score"></span>
			</div>
			<div id="my-hand" class="my-hand"></div>
		</section>
	</main>

	<div class="action-buttons">
		<button id="ready-button" type="button" class="hidden">Ready</button>
		<button id="claim-button" type="button" class="hidden">Be Landlord</button>
		<button id="decline-button" type="button" class="hidden">Pass (Bidding)</button>
		<button id="reset-selection-button" type="button" disabled>Reset selection</button>
		<button id="pass-button" type="button" disabled>Pass</button>
		<button id="play-button" type="button" disabled>Play</button>
	</div>

	<script type="module" src="./js/remoteTable.js"></script>
</body>

</html>
