<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-title" content="Dou Di Zhu">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
	<meta name="theme-color" content="#2e426b" />

	<title>Dou Di Zhu — Create or Join</title>

	<link rel="apple-touch-icon" href="icons/180x180.png" />
	<link rel="icon" href="icons/favicon.png" type="image/png" sizes="32x32">
	<link rel="icon" href="icons/poker-chip.svg" type="image/svg+xml">
	<link rel="manifest" href="manifest.json">
	<link rel="stylesheet" href="css/style.css">
</head>

<body id="landing">
	<main>
		<section class="landing-panel">
			<h1>Dou Di Zhu</h1>
			<p id="landing-status">Connect to a server, then create or join a table.</p>

			<label>
				<span>Server (ws:// or wss://)</span>
				<input id="ws-url-input" type="text" placeholder="ws://localhost:8787">
			</label>

			<label>
				<span>Your name</span>
				<input id="name-input" type="text" maxlength="20" placeholder="Player">
			</label>

			<div class="landing-actions">
				<button id="create-button" type="button">Create table</button>
			</div>

			<div class="landing-join">
				<label>
					<span>Table ID</span>
					<input id="table-id-input" type="text" placeholder="abc123">
				</label>
				<label>
					<span>Seat (optional)</span>
					<input id="seat-input" type="number" min="0" max="5" placeholder="auto">
				</label>
				<button id="join-button" type="button">Join</button>
			</div>

		</section>
	</main>
	<footer>
		<div id="credit"><a href="https://github.com/Tehes/poker">made by Tehes</a></div>
	</footer>

	<script type="module">
		const wsInput = document.getElementById("ws-url-input");
		const nameInput = document.getElementById("name-input");
		const createBtn = document.getElementById("create-button");
		const joinBtn = document.getElementById("join-button");
		const tableIdInput = document.getElementById("table-id-input");
		const seatInput = document.getElementById("seat-input");
		const statusEl = document.getElementById("landing-status");

		const defaultWsUrl = (() => {
			const proto = location.protocol === "https:" ? "wss" : "ws";
			return `${proto}://${location.hostname || "localhost"}:8787`;
		})();
		wsInput.value = localStorage.getItem("doudizhu:wsUrl") || defaultWsUrl;
		nameInput.value = localStorage.getItem("doudizhu:name") || "";

		function setStatus(text) {
			statusEl.textContent = text;
		}

		function buildSeatUrl({ tableId, seatIndex, name, wsUrl }) {
			const params = new URLSearchParams({ tableId });
			if (typeof seatIndex === "number" && Number.isInteger(seatIndex)) {
				params.set("seatIndex", String(seatIndex));
			}
			if (name) params.set("name", name);
			if (wsUrl) params.set("wsUrl", wsUrl);
			return `${location.origin}${location.pathname.replace(/index\.html$/, "")}remoteTable.html?${params.toString()}`;
		}

		function gotoSeat(opts) {
			location.href = buildSeatUrl(opts);
		}

		function openSocket() {
			return new Promise((resolve, reject) => {
				const url = wsInput.value.trim();
				if (!url) {
					reject(new Error("no ws url"));
					return;
				}
				localStorage.setItem("doudizhu:wsUrl", url);
				const s = new WebSocket(url);
				s.onopen = () => resolve(s);
				s.onerror = () => reject(new Error("connection error"));
			});
		}

		createBtn.addEventListener("click", async () => {
			try {
				setStatus("Connecting to server…");
				const sock = await openSocket();
				sock.send(JSON.stringify({ type: "create_table" }));
				sock.onmessage = (ev) => {
					const msg = JSON.parse(ev.data);
					if (msg.type === "session" && msg.tableId) {
						sock.close();
						const name = (nameInput.value || "Player").trim();
						localStorage.setItem("doudizhu:name", name);
						// Host enters the room immediately.
						gotoSeat({
							tableId: msg.tableId,
							name,
							wsUrl: wsInput.value.trim(),
						});
					} else if (msg.type === "error") {
						setStatus(`Server: ${msg.message ?? msg.code}`);
					}
				};
			} catch (err) {
				setStatus(`Connection failed: ${err.message || err}`);
			}
		});

		joinBtn.addEventListener("click", () => {
			const tableId = tableIdInput.value.trim();
			if (!tableId) {
				setStatus("Enter a table ID.");
				return;
			}
			const seatRaw = seatInput.value.trim();
			let seatIndex = null;
			if (seatRaw !== "") {
				const parsed = Number.parseInt(seatRaw, 10);
				if (Number.isNaN(parsed)) {
					setStatus("Seat must be a number or left empty for auto-assign.");
					return;
				}
				seatIndex = parsed;
			}
			const name = (nameInput.value || "Player").trim();
			localStorage.setItem("doudizhu:name", name);
			gotoSeat({
				tableId,
				seatIndex,
				name,
				wsUrl: wsInput.value.trim(),
			});
		});
	</script>
</body>

</html>
